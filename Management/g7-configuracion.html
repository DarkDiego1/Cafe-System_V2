<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerente — G7 Configuración</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#F5EDD8;--warm:#EAD7B0;--espresso:#2C1A0E;--roast:#4A2C1A;--caramel:#C47F2B;--gold:#E8A830;--latte:#8B5E3C;--foam:#FBF5E6;--mist:#F0E6CF;--success:#3A7D44;--danger:#C0392B;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--espresso);min-height:100vh;display:flex;flex-direction:column;}
.shell{background:var(--cream);width:100%;min-height:100vh;display:flex;flex-direction:column;flex:1;}
.page-top{background:var(--espresso);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
.page-top h2{font-family:'Playfair Display',serif;color:var(--cream);font-size:22px;}
.page-top p{color:var(--warm);font-size:12px;margin-top:2px;}
.btn-p{background:var(--espresso);color:var(--cream);border:none;border-radius:10px;padding:9px 18px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s;}
.btn-p:hover{background:var(--roast);}
.btn-p.gold{background:var(--gold);color:var(--espresso);}
.btn-o{background:none;border:1.5px solid var(--warm);color:var(--espresso);border-radius:10px;padding:8px 16px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-o:hover{border-color:var(--caramel);}
.input{width:100%;border:1.5px solid var(--warm);border-radius:10px;padding:8px 12px;font-size:13px;font-family:inherit;background:var(--mist);outline:none;color:var(--espresso);}
.field label{display:block;font-size:11px;color:var(--latte);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.toggle{display:flex;align-items:center;gap:8px;}
.tg{width:36px;height:20px;background:var(--success);border-radius:10px;position:relative;cursor:pointer;flex-shrink:0;}
.tg .tk{width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;right:3px;top:3px;transition:all .2s;}
.tg.off{background:var(--warm);}
.tg.off .tk{right:auto;left:3px;}
.divider{height:1px;background:var(--warm);margin:0 0 16px;}
</style>
</head>
<body>
<div class="shell">
  <div class="page-top">
    <div><h2>Configuración</h2><p>UC64 · parámetros del sistema</p></div>
    <button class="btn-p gold" id="btnGuardarTodo">Guardar todo</button>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:0">
    <!-- Columna izquierda -->
    <div style="padding:24px;border-right:1px solid var(--warm)">
      <p style="font-family:'Playfair Display',serif;font-size:16px;font-weight:600;margin-bottom:14px">🏪 Inventario</p>
      <div class="field" style="margin-bottom:10px">
        <label>Umbral alerta bajo stock (%)</label>
        <input class="input" id="umbralBajo" value="25">
      </div>
      <div class="field" style="margin-bottom:10px">
        <label>Umbral crítico (%)</label>
        <input class="input" id="umbralCritico" value="10">
      </div>
      <div class="toggle" style="margin-bottom:20px">
        <div class="tg" id="tgOrdenesAuto" onclick="this.classList.toggle('off')"><div class="tk"></div></div>
        <span style="font-size:13px">Órdenes automáticas (RF66)</span>
      </div>
      <div class="divider"></div>
      <p style="font-family:'Playfair Display',serif;font-size:16px;font-weight:600;margin-bottom:14px">🕐 Horarios</p>
      <div class="field" style="margin-bottom:10px">
        <label>Apertura</label>
        <input class="input" type="time" id="horaApertura" value="07:00">
      </div>
      <div class="field" style="margin-bottom:10px">
        <label>Cierre</label>
        <input class="input" type="time" id="horaCierre" value="21:00">
      </div>
      <div class="toggle">
        <div class="tg" id="tgDomingos" onclick="this.classList.toggle('off')"><div class="tk"></div></div>
        <span style="font-size:13px">Abrir los domingos</span>
      </div>
    </div>

    <!-- Columna derecha -->
    <div style="padding:24px">
      <p style="font-family:'Playfair Display',serif;font-size:16px;font-weight:600;margin-bottom:14px">🏆 Lealtad</p>
      <div class="field" style="margin-bottom:10px">
        <label>Puntos por $10 MXN gastado</label>
        <input class="input" id="puntosPor10" value="1">
      </div>
      <div class="field" style="margin-bottom:10px">
        <label>Umbral nivel Silver (pts)</label>
        <input class="input" id="umbralSilver" value="500">
      </div>
      <div class="field" style="margin-bottom:10px">
        <label>Umbral nivel Gold (pts)</label>
        <input class="input" id="umbralGold" value="1500">
      </div>
      <div class="field" style="margin-bottom:14px">
        <label>Umbral nivel Platinum (pts)</label>
        <input class="input" id="umbralPlatinum" value="3800">
      </div>
      <div class="divider"></div>
      <p style="font-family:'Playfair Display',serif;font-size:16px;font-weight:600;margin-bottom:14px">🔔 Notificaciones</p>
      <div class="toggle" style="margin-bottom:10px">
        <div class="tg" id="tgAlertaInv" onclick="this.classList.toggle('off')"><div class="tk"></div></div>
        <span style="font-size:13px">Alertas de inventario crítico</span>
      </div>
      <div class="toggle" style="margin-bottom:10px">
        <div class="tg" id="tgOrdenesDemo" onclick="this.classList.toggle('off')"><div class="tk"></div></div>
        <span style="font-size:13px">Órdenes demoradas</span>
      </div>
      <div class="toggle" style="margin-bottom:16px">
        <div class="tg off" id="tgReportesAuto" onclick="this.classList.toggle('off')"><div class="tk"></div></div>
        <span style="font-size:13px">Reportes automáticos diarios</span>
      </div>
      <div class="divider"></div>
      <p style="font-family:'Playfair Display',serif;font-size:16px;font-weight:600;margin-bottom:14px">💾 Respaldo</p>
      <div style="display:flex;gap:8px">
        <button class="btn-p" id="btnRespaldar" style="flex:1">Respaldar ahora</button>
        <button class="btn-o" id="btnHistorial" style="flex:1">Ver historial</button>
      </div>
    </div>
  </div>
</div>
<script>
// Integración backend:
// GET /api/config → { umbralBajo, umbralCritico, ordenesAuto, apertura, cierre, domingos, lealtad:{...}, notifs:{...} }
// PUT /api/config → guardar toda la configuración
// POST /api/config/respaldar → generar respaldo
// GET /api/config/historial-respaldos → lista de respaldos
document.getElementById('btnGuardarTodo').addEventListener('click', () => {
  const config = {
    inventario: {
      umbralBajo: document.getElementById('umbralBajo').value,
      umbralCritico: document.getElementById('umbralCritico').value,
      ordenesAuto: !document.getElementById('tgOrdenesAuto').classList.contains('off')
    },
    horarios: {
      apertura: document.getElementById('horaApertura').value,
      cierre: document.getElementById('horaCierre').value,
      domingos: !document.getElementById('tgDomingos').classList.contains('off')
    },
    lealtad: {
      puntosPor10: document.getElementById('puntosPor10').value,
      umbralSilver: document.getElementById('umbralSilver').value,
      umbralGold: document.getElementById('umbralGold').value,
      umbralPlatinum: document.getElementById('umbralPlatinum').value
    },
    notificaciones: {
      alertaInventario: !document.getElementById('tgAlertaInv').classList.contains('off'),
      ordenesDemoradas: !document.getElementById('tgOrdenesDemo').classList.contains('off'),
      reportesAuto: !document.getElementById('tgReportesAuto').classList.contains('off')
    }
  };
  // TODO: fetch('/api/config', { method:'PUT', body: JSON.stringify(config) })
  console.log('Guardar configuración:', config);
});
document.getElementById('btnRespaldar').addEventListener('click', () => {
  // TODO: POST /api/config/respaldar
  console.log('Iniciar respaldo manual');
});
document.getElementById('btnHistorial').addEventListener('click', () => {
  // TODO: GET /api/config/historial-respaldos
  console.log('Ver historial de respaldos');
});
</script>
</body>
</html>
